<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Дашборд задач — Битрикс24</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://api.bitrix24.com/api/v1/"></script>
</head>
<body>
<header class="topbar">
    <div class="topbar__left">
        <div class="brand">Дашборд задач</div>
        <div class="subtitle">Битрикс24</div>
    </div>
    <div class="topbar__right">
        <button id="btnReload" class="btn btn--primary" type="button">Обновить</button>
    </div>
</header>

<main class="container">
    <section class="panel">
        <div class="panel__title">Фильтры</div>
        <div class="filters">
            <label class="field">
                <div class="field__label">Проект (группа)</div>
                <select id="groupSelect" class="field__control">
                    <option value="">Все проекты</option>
                </select>
            </label>
            <label class="field">
                <div class="field__label">ID исполнителя (необязательно)</div>
                <input id="userInput" type="text" class="field__control" placeholder="Например: 123" />
            </label>
            <label class="field">
                <div class="field__label">Период (создано за последние)</div>
                <select id="periodSelect" class="field__control">
                    <option value="7">7 дней</option>
                    <option value="30" selected>30 дней</option>
                    <option value="90">90 дней</option>
                    <option value="365">1 год</option>
                    <option value="0">За всё время</option>
                </select>
            </label>
        </div>
    </section>

    <section class="grid">
        <div class="card">
            <div class="card__title">Статусы задач</div>
            <canvas id="chartStatuses" height="200"></canvas>
        </div>

        <div class="card">
            <div class="card__title">Просрочено</div>
            <div class="kpiRow">
                <div class="kpi">
                    <div id="kpiOverdueCount" class="kpi__value">—</div>
                    <div class="kpi__label">Задач</div>
                </div>
                <div class="kpi">
                    <div id="kpiOverduePct" class="kpi__value">—</div>
                    <div class="kpi__label">% от общего</div>
                </div>
            </div>
            <div class="small">Считаются задачи с DEADLINE в прошлом и не завершенные.</div>
        </div>

        <div class="card card--wide">
            <div class="card__title">Нагрузка по исполнителям (топ-15)</div>
            <canvas id="chartAssignees" height="120"></canvas>
        </div>

        <div class="card card--wide">
            <div class="card__title">SLA (Lead / Cycle Time)</div>
            <div class="kpiRow">
                <div class="kpi">
                    <div class="kpi__label">Lead time (медиана, дн.)</div>
                    <div id="kpiLeadMedian" class="kpi__value">—</div>
                </div>
                <div class="kpi">
                    <div class="kpi__label">Cycle time (медиана, дн.)</div>
                    <div id="kpiCycleMedian" class="kpi__value">—</div>
                </div>
                <div class="kpi">
                    <div class="kpi__label">Закрыто задач</div>
                    <div id="kpiClosedCount" class="kpi__value">—</div>
                </div>
            </div>
        </div>
    </section>

    <pre id="log" class="log"></pre>
</main>
<script src="app.js"></script>
</body>
</html>
